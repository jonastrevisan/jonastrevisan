name: Auto Update Projects

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🧰 Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: 📡 Fetch repositories
        run: |
          curl -s https://api.github.com/users/jonastrevisan/repos?per_page=100 > repos.json

      - name: 🧠 Generate project list
        run: |
          echo "" > projects.md

          cat repos.json | jq -r '
            sort_by(.updated_at) | reverse |
            .[] |
            select(.fork == false and .archived == false) |
            "- 🔗 [" + .name + "](" + .html_url + ") - " + (.description // "Sem descrição")
          ' | head -n 5 >> projects.md

      - name: ✍️ Update README
        run: |
          START="<!-- AUTO-PROJECTS:START -->"
          END="<!-- AUTO-PROJECTS:END -->"

          CONTENT=$(cat projects.md)

          awk -v start="$START" -v end="$END" -v content="$CONTENT" '
          $0 ~ start {
              print
              print content
              skip=1
              next
          }
          $0 ~ end {
              skip=0
          }
          !skip
          ' README.md > README.tmp

          mv README.tmp README.md

      - name: 🚀 Commit & push if changed
        run: |
          git config user.name "jonastrevisan"
          git config user.email "trevisanjonas@gmail.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "🤖 auto update projects"
            git push
          fi
    