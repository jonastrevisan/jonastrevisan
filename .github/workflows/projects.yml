name: Auto Update Profile & Snake

on:
  schedule:
    - cron: "0 */6 * * *" # Roda a cada 6 horas
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # --- PARTE 1: GERAÇÃO DA COBRINHA ---
      - name: 🐍 Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: jonastrevisan
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- PARTE 2: LISTA DE PROJETOS RECENTES ---
      - name: 📡 Fetch and Generate Project List
        run: |
          # Busca repos, filtra forks/arquivados, ordena por atualização e pega os 5 primeiros
          curl -s "https://api.github.com/users/jonastrevisan/repos?per_page=100&sort=updated" > repos.json
          
          echo "#### 🛠️ Projetos Atualizados Recentemente" > projects.md
          echo "" >> projects.md
          
          cat repos.json | jq -r '
            [ .[] | select(.fork == false and .archived == false and .name != "jonastrevisan") ] | 
            sort_by(.updated_at) | reverse | .[0:5] | 
            .[] | "  - **[\(.name)](\(.html_url))** - \(.description // "Fullstack Project") 🌟 \(.stargazers_count)"
          ' >> projects.md

      - name: ✍️ Update README Content
        run: |
          START="<!-- AUTO-PROJECTS:START -->"
          END="<!-- AUTO-PROJECTS:END -->"
          CONTENT=$(cat projects.md)
          
          # Uso de sed mais robusto para trocar o bloco de conteúdo
          sed -i "/$START/,/$END/ { /$START/! { /$END/! d } }" README.md
          sed -i "/$START/r projects.md" README.md

      # --- PARTE 3: COMMIT E DEPLOY ---
      - name: 🚀 Commit & Push
        run: |
          git config user.name "jonastrevisan"
          git config user.email "trevisanjonas@gmail.com"
          
          # Adiciona as imagens da cobrinha na branch output para não poluir a main
          git add README.md
          
          if git diff --cached --quiet; then
            echo "Sem mudanças no README."
          else
            git commit -m "🤖 profile: updated projects and snake"
            git push
          fi

      # Upload da cobrinha para a branch 'output' (mantém seu repo limpo)
      - name: 📤 Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
