name: Auto Update Projects

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🧰 Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: 📡 Fetch repositories
        run: |
          curl -s https://api.github.com/users/jonastrevisan/repos?per_page=100 > repos.json

      - name: 🧠 Generate project list
        run: |
          echo "" > projects.md

          cat repos.json | jq -r '
            sort_by(.updated_at) | reverse |
            .[] |
            select(.fork == false and .archived == false) |
            select(.description != null) |
            "- 🔗 [" + .name + "](" + .html_url + ") - " + .description
          ' | head -n 5 >> projects.md

      - name: ✍️ Update README
        run: |
          awk '
          /<!-- AUTO-PROJECTS:START -->/ {
            print;
            while ((getline line < "projects.md") > 0) print line;
            close("projects.md");
            skip=1;
            next
          }
          /<!-- AUTO-PROJECTS:END -->/ {
            skip=0
          }
          !skip { print }
          ' README.md > README.new

          mv README.new README.md

      - name: 🚀 Commit & push if changed
        run: |
          git config user.name "jonastrevisan"
          git config user.email "trevisanjonas@gmail.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "🤖 auto update projects"
            git push
          fi
